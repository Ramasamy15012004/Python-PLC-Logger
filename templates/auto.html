<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AUTO - Select Model</title>

  <style>
    :root {
      --brand: #003f57;
      --accent-blue: #0a6fb8;
      --btn-green-top: #66ff66;
      --btn-green-bottom: #00c030;
      --bg: #ffffff;
      --btn-border: rgba(0, 0, 0, 0.6);
      --shadow: 0 8px 20px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      font-family: "Segoe UI", Roboto, Arial, Helvetica, sans-serif;
      color: var(--brand);
    }

    .topbar {
      position: absolute;
      left: 18px;
      right: 18px;
      top: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 9999;
    }

    .main-area,
    .grid {
      position: relative;
      z-index: 1;
    }

    .back-btn {
      pointer-events: auto;
      background: linear-gradient(#f2f2f2, #cfcfcf);
      padding: 10px 18px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: inset 0 4px 8px rgba(255, 255, 255, 0.6), 0 6px 12px rgba(0, 0, 0, 0.18);
    }

    .back-btn:active {
      transform: translateY(3px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.18);
    }

    .title {
      font-size: 44px;
      font-weight: 800;
    }

    .clock {
      width: 130px;
      height: 130px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a6fb8;
      color: white;
      border-radius: 50%;
      font-weight: 700;
      text-align: center;
      font-size: 14px;
    }

    .main-area {
      height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 200px;
    }
.grid-wrap {
  width: 100%;
  max-width: 800px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
}

#pr3 {
  grid-column: 1 / -1;   /* span both columns */
  justify-self: center; /* center within the row */
}

    .grid-wrap {
  width: 100%;
  max-width: 800px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  justify-items: center;
}

#pr3 {
  grid-column: span 2;
}


    .model-btn {
      background: linear-gradient(to bottom, var(--btn-green-top), var(--btn-green-bottom));
      padding: 16px 20px;
      width: 320px;
      height: 100px;
      font-size: 22px;
      font-weight: 900;
      color: #002200;
      border-radius: 14px;
      border: 4px solid var(--btn-border);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform .12s ease;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .model-btn:hover {
      transform: translateY(-3px);
    }
    
    .model-btn_ {
      background: linear-gradient(to bottom, var(--btn-green-top), var(--btn-green-bottom));
      padding: 16px 20px;
      width: 320px;
      height: 100px;
      font-size: 22px;
      font-weight: 900;
      color: #002200;
      border-radius: 14px;
      border: 4px solid var(--btn-border);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform .12s ease;
      display: flex;
      justify-content: center;
      align-items: center;
    }


    .model-btn_:hover {
      transform: translateY(-3px);
    }
  </style>
  <style>
  
    .t2 {
      position: fixed;
      bottom: 40px;
      left: 20px;
      z-index: 9999;
    }

    .t1 {
      position: fixed;
      bottom: 20px;
      left: 30px;
      z-index: 9999;
    }

    .t3 {
      position: fixed;
      bottom: 80px;
      right: 100px;
      z-index: 9999;
    }

    .indicator {
      width: 31px;
      height: 31px;
      border-radius: 50%;
      border: 3px solid #222;
      background-color: #ff0000;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
    }

    .indicator.on {
      background-color: #00ff00;
      box-shadow: 0 0 12px #33ff33;
    }


    .grey-btn {
      background: linear-gradient(var(--grey-top), var(--grey-bottom));
      color: #222;
    }

    .btn2 {
      appearance: none;
      border: 4px solid var(--btn-border);
      border-radius: 14px;
      font-weight: 600;
      font-size: 20px;
      min-width: 100px;
      padding: 12px 20px;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform .12s ease, box-shadow .12s ease;
    }

    .btn2:active {
      transform: translateY(3px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.18);
    }
  </style>

</head>

<body>
  <div class="t2">
    <h4>PLC Com.</h4>
  </div>
  <div class="t1">
    <div class="indicator" id="indicator3071"></div>
  </div>

  <div class="topbar">
    <button class="back-btn" id="backBtn">BACK</button>

    <h1 class="title">PRESSURE TESTING SYSTEM</h1>

    <div class="clock" id="clock"></div>

  </div>

  <main class="main-area">
    <div style="text-align:center;">

      <div class="grid-wrap">
        <button class="model-btn" id="pr1">Burst Pressure</button>
        <button class="model-btn" id="pr2">Stage Pressure</button>
        <button class="model-btn_" id="pr3">Impulse Pressure</button>
      </div>
    </div>
  </main>
  <div class="t3">
    <button class="grey-btn btn2" id="graph">Graph</button>
  </div>

  <script>
    /* CLOCK */
    function updateClock() {
      const m = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      const d = new Date();
      document.getElementById("clock").innerHTML =
        `${String(d.getDate()).padStart(2, '0')}/${m[d.getMonth()]}/${d.getFullYear()}<br>` +
        `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}:${String(d.getSeconds()).padStart(2, '0')}`;
    }
    setInterval(updateClock, 1000);
    updateClock();
    // Navigation buttons
    document.getElementById("backBtn").onclick = function () {
      window.location.href = "/main";
    };

    document.getElementById("pr1").onclick = function () {
      window.location.href = "/burst_auto";
    };

    document.getElementById("pr2").onclick = function () {
      window.location.href = "/stage_auto";
    };

    document.getElementById("pr3").onclick = function () {
      window.location.href = "/impluse_1_auto";
    };
    document.getElementById("graph").onclick = function () {
      window.location.href = "/graph";
    };

  </script>

  <script>
    fetch("/page_change", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ page: 8 })
    });
  </script>
<script>
  function updateIndicator() {
    fetch("/indicator_plc")
      .then(r => r.json())
      .then(data => {
        const el = document.getElementById("indicator3071");
        if (!el || !data.ok) return;

        if (data.value === 1) {
          el.classList.add("on");   // green
        } else {
          el.classList.remove("on"); // red
        }
      })
      .catch(() => {});
  }

  setInterval(updateIndicator, 300);
  updateIndicator();
</script>


</body>

</html>
