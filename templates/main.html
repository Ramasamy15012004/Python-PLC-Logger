<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MAIN - PLC Data Logger</title>
  <style>
    :root {
      --brand: #003f57;
      --accent-blue: #0a6fb8;
      --btn-green-top: #66ff66;
      --btn-green-bottom: #00c030;
      --btn-yellow-top: #fff36b;
      --btn-yellow-bottom: #e6b800;
      --btn-orange-top: #ffbf8a;
      --btn-orange-bottom: #f0802a;
      --bg: #ffffff;
      --btn-border: rgba(0, 0, 0, 0.6);
      --shadow: 0 8px 20px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      font-family: "Segoe UI", Roboto, Arial, Helvetica, sans-serif;
      color: var(--brand)
    }

    .topbar {
      position: absolute;
      left: 18px;
      right: 18px;
      top: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 9999;
    }

    .main-area,
    .grid {
      position: relative;
      z-index: 1;
    }

    .back-btn {
      pointer-events: auto;
      background: linear-gradient(#f2f2f2, #cfcfcf);
      padding: 10px 18px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: inset 0 4px 8px rgba(255, 255, 255, 0.6), 0 6px 12px rgba(0, 0, 0, 0.18);
    }

    .back-btn:active {
      transform: translateY(3px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.18);
    }

    .page-title {
      pointer-events: none;
      font-size: 40px;
      font-weight: 800;
      letter-spacing: 3px;
      margin: 0;
      text-align: center;
    }

    .clock {
      width: 130px;
      height: 130px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a6fb8;
      color: white;
      border-radius: 50%;
      font-weight: 700;
      text-align: center;
      font-size: 14px;
    }

    .main-area {
      height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 85px;
      position: relative;
    }

    .grid {
      width: 100%;
      max-width: 1000px;
      position: relative;
      height: 400px;
    }

    .btn {
      -webkit-appearance: none;
      appearance: none;
      border: 4px solid var(--btn-border);
      padding: 16px 42px;
      font-weight: 900;
      font-size: 22px;
      border-radius: 14px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform .12s ease, box-shadow .12s ease;
      min-width: 240px;
      position: absolute;
    }

    .btn-auto {
      background: linear-gradient(to bottom, var(--btn-green-top), var(--btn-green-bottom));
      color: #002200;
    }

    .btn-manual {
      background: linear-gradient(to bottom, var(--btn-yellow-top), var(--btn-yellow-bottom));
      color: #1a1a00;
    }

    .btn-edit {
      background: linear-gradient(to bottom, var(--btn-orange-top), var(--btn-orange-bottom));
      color: #3b1700;
      min-width: 260px;
      border-radius: 16px;
      font-size: 20px;
      padding: 5px 10px;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.30)
    }

    .auto-slot {
      position: absolute;
      left: 15%;
      top: 150px;
    }

    .manual-slot {
      position: absolute;
      right: 40%;
      top: 150px;
    }

    .edit-slot {
      position: absolute;
      right: 100%;
      top: 400px;
    }

    .t2 {
      position: fixed;
      bottom: 40px;
      left: 20px;
      z-index: 9999;
    }

    .t1 {
      position: fixed;
      bottom: 20px;
      left: 30px;
      z-index: 9999;
    }

    .indicator {
      width: 31px;
      height: 31px;
      border-radius: 50%;
      border: 3px solid #222;
      background-color: #ff0000;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
    }

    .indicator.on {
      background-color: #00ff00;
      box-shadow: 0 0 12px #33ff33;
    }

    .ip-selection {
      margin-top: 20px;
      text-align: center;
    }

    .ip-selection label {
      font-weight: 700;
      margin-right: 10px;
    }

    .ip-selection select {
      padding: 10px;
      font-size: 16px;
      border: 2px solid var(--btn-border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      cursor: pointer;
    }
  </style>

</head>

<body>

  <div class="t2">
    <h4>PLC Com.</h4>
  </div>
  <div class="t1">
    <div class="indicator" id="indicator3071"></div>
  </div>

  <div class="topbar" aria-hidden="false">
    <div style="pointer-events:auto">
      <button class="back-btn" id="backBtn">BACK</button>
    </div>
    <h1 class="page-title" aria-hidden="true">MAIN</h1>
    <div class="clock" id="clock"></div>
  </div>
  </div>

  <main class="main-area" role="main">
    <div class="grid" aria-describedby="main">
      <div class="auto-slot">
        <button class="btn btn-auto" id="autoBtn">AUTO</button>
      </div>

      <div class="manual-slot">
        <button class="btn btn-manual" id="manualBtn">MANUAL</button>
      </div>

      <div class="edit-slot">
        <button class="btn btn-edit" id="editBtn">Edit<br>Program</button>
      </div>

    </div>

  </main>

  <script>
    function updateClock() {
      const m = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      const d = new Date();
      document.getElementById("clock").innerHTML =
        `${String(d.getDate()).padStart(2, '0')}/${m[d.getMonth()]}/${d.getFullYear()}<br>` +
        `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}:${String(d.getSeconds()).padStart(2, '0')}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    document.getElementById("backBtn").onclick = function () {
      window.location.href = "/";
    };


    document.getElementById("autoBtn").onclick = function () {
      window.location.href = "/auto";
    };

    document.getElementById("manualBtn").onclick = function () {
      window.location.href = "/manual";
    };

    document.getElementById("editBtn").onclick = function () {
      window.location.href = "/edit_program";
    };
  </script>
  <script>
    fetch("/page_change", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ page: 2 })
    });
  </script>
<script>
  function updateIndicator() {
    fetch("/indicator_plc")
      .then(r => r.json())
      .then(data => {
        const el = document.getElementById("indicator3071");
        if (!el || !data.ok) return;

        if (data.value === 1) {
          el.classList.add("on");   // green
        } else {
          el.classList.remove("on"); // red
        }
      })
      .catch(() => {});
  }

  setInterval(updateIndicator, 300);
  updateIndicator();
</script>



</body>

</html>
