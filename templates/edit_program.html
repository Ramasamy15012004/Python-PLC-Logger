<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Edit Model</title>

  <style>
    :root {
      --brand: #003f57;
      --accent-blue: #0a6fb8;
      --btn-yellow-top: #fff36b;
      --btn-yellow-bottom: #e6b800;
      --bg: #ffffff;
      --btn-border: rgba(0, 0, 0, 0.6);
      --shadow: 0 8px 20px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      font-family: "Segoe UI", Roboto, Arial, Helvetica, sans-serif;
      color: var(--brand);
    }

    .topbar {
      position: absolute;
      left: 18px;
      right: 18px;
      top: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 9999;
      /* FIX */
    }

    .topbar1 {
      position: fixed;
      bottom: 20px;
      right: 20px;
      gap: 10px;
    }

    .back-btn {
      pointer-events: auto;
      background: linear-gradient(#f2f2f2, #cfcfcf);
      padding: 10px 18px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: inset 0 4px 8px rgba(255, 255, 255, 0.6), 0 6px 12px rgba(0, 0, 0, 0.18);
    }

    .back-btn:active {
      transform: translateY(3px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.18);
    }

    .title {
      font-size: 44px;
      font-weight: 800;
    }

    .clock {
      width: 130px;
      height: 130px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a6fb8;
      color: white;
      border-radius: 50%;
      font-weight: 700;
      text-align: center;
      font-size: 14px;
    }

    .main-area {
      height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 200px;
    }
.grid-wrap {
  width: 100%;
  max-width: 800px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
}

#pr3 {
  grid-column: 1 / -1;   /* span both columns */
  justify-self: center; /* center within the row */
}

    .model-btn {
      background: linear-gradient(to bottom, var(--btn-yellow-top), var(--btn-yellow-bottom));
      width: 320px;
      height: 100px;
      padding: 0;
      font-size: 22px;
      font-weight: 900;
      color: #1a1a00;
      border-radius: 14px;
      border: 4px solid var(--btn-border);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform .12s ease;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .model-btn:hover {
      transform: translateY(-3px);
    }

    .select {
      width: 200px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
      background-color: #f9f9f9;
      color: #333;
      cursor: pointer;
    }
  </style>

  <style>
  
    .t2 {
      position: fixed;
      bottom: 40px;
      left: 20px;
      z-index: 9999;
    }

    .t1 {
      position: fixed;
      bottom: 20px;
      left: 30px;
      z-index: 9999;
    }

    .indicator {
      width: 31px;
      height: 31px;
      border-radius: 50%;
      border: 3px solid #222;
      background-color: #ff0000;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
    }

    .indicator.on {
      background-color: #00ff00;
      box-shadow: 0 0 12px #33ff33;
    }

    .note-box {
      padding: 8px 12px;
      background: #fffbe6;
      color: #805b00;
      border: 1px dashed #ffcc00;
      border-radius: 4px;
      font-size: 14px;
    }
  </style>

</head>

<body>

  <div class="t2">
    <h4>PLC Com.</h4>
  </div>

  <div class="t1">
    <div class="indicator" id="indicator3071"></div>
  </div>

  <div class="topbar">
    <button class="back-btn" id="backBtn">BACK</button>
    <h1 class="title">Select Program to Edit</h1>
    <div class="clock" id="clock"></div>
  </div>

  <main class="main-area">
    <div style="text-align:center;">
      <div class="grid-wrap">
        <button class="model-btn" data-model="PR-1" id="pr1">Burst Pressure</button>
        <button class="model-btn" data-model="PR-2" id="pr2">Stage Pressure</button>
        <button class="model-btn" data-model="PR-3" id="pr3">Impulse Pressure</button>
      </div>

    </div>

  </main>

  <div class="topbar1">
    <div class="note-box">
      ⚠️ <strong>Note:</strong><br>
      If IP is not connected, ensure the correct network configuration.
    </div>
    <select class="select" id="ipSelect"></select>
    <button class="back-btn" onclick="applyIP()">Apply</button>
  </div>

  <script>
    function updateClock() {
      const m = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      const d = new Date();
      document.getElementById("clock").innerHTML =
        `${String(d.getDate()).padStart(2, '0')}/${m[d.getMonth()]}/${d.getFullYear()}<br>` +
        `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}:${String(d.getSeconds()).padStart(2, '0')}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    document.getElementById("backBtn").onclick = function () {
      window.location.href = "/main";
    };

    document.getElementById("pr1").onclick = function () {
      window.location.href = "/burst_edit";
    };

    document.getElementById("pr2").onclick = function () {
      window.location.href = "/stage_edit";
    };

    document.getElementById("pr3").onclick = function () {
      window.location.href = "/impluse_1_edit";
    };
  </script>

  <script>
    fetch("/page_change", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ page: 4 })
    });
  </script>

  <script>
    function loadIPs() {
      const sel = document.getElementById("ipSelect");
      sel.innerHTML = "<option>Scanning...</option>";

      fetch("/get_available_ips")
        .then(r => r.json())
        .then(d => {
          let list = d.ips;
          sel.innerHTML = "";

          if (list.length === 0) {
            let opt = document.createElement("option");
            opt.textContent = "No PLCs found";
            sel.appendChild(opt);
          }

          list.forEach(ip => {
            let opt = document.createElement("option");
            opt.value = opt.textContent = ip;
            sel.appendChild(opt);
          });
        })
        .catch(err => {
          sel.innerHTML = "<option>Error scanning</option>";
        });
    }

    function applyIP() {
      const ip = document.getElementById("ipSelect").value;
      const btn = event.target;
      const oldText = btn.innerText;

      btn.innerText = "Connecting...";
      btn.disabled = true;

        fetch("/set_device_ip", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ip })
        })

        .then(r => r.json())
        .then(d => {
          if (d.success) {
            alert("IP changed to: " + d.ip);
          } else {
            alert("Error: " + (d.error || "Connection failed"));
          }
        })
        .finally(() => {
          btn.innerText = oldText;
          btn.disabled = false;
        });
    }

    loadIPs();
  </script>

  <script>
   function updateIndicator() {
  fetch("/indicator_plc")
    .then(r => r.json())
    .then(data => {
      const el = document.getElementById("indicator3071");
      if (!el || !data.ok) return;

      if (data.value === 1) {
        el.classList.add("on");
      } else {
        el.classList.remove("on");
      }
    })
    .catch(() => {});
}

    setInterval(updateIndicator, 300);
    updateIndicator();
  </script>

</body>

</html>
