<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Graph</title>

    <style>
        :root {
            --brand: #003f57;
            --accent-blue: #0a6fb8;
            --btn-border: rgba(0, 0, 0, 0.6);
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.28);

            --green-top: #66ff66;
            --green-bottom: #00c030;

            --red-top: #ff6b6b;
            --red-bottom: #e60000;

            --yellow-top: #fff36b;
            --yellow-bottom: #e6b800;

            --grey-top: #f2f2f2;
            --grey-bottom: #cfcfcf;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            font-family: "Segoe UI", Roboto, Arial, Helvetica, sans-serif;
            min-height: 100vh;
            color: var(--brand);
        }

        .topbar {
            position: absolute;
            top: 12px;
            left: 18px;
            right: 18px;

            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            pointer-events: auto;
        }

        .topbar2 {
            margin-top: 160px;
            /* below topbar */
            width: 100%;
            max-width: 920px;
            padding: 12px 16px;

            display: flex;
            flex-direction: column;
            gap: 14px;

            background: #f8f9fa;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
        }

        .csv-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .csv-controls select {
            flex: 1;
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
        }


        .back-btn {
            pointer-events: auto;
            background: linear-gradient(#f2f2f2, #cfcfcf);
            padding: 10px 18px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: inset 0 4px 8px rgba(255, 255, 255, 0.6), 0 6px 12px rgba(0, 0, 0, 0.18);
        }

        .back-btn:active {
            transform: translateY(3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.18);
        }

        .title {
            font-size: 40px;
            font-weight: 800;
            margin: 0;
            letter-spacing: 2px;
            padding: 6px 24px;
            
        }

        .clock {
            width: 130px;
            height: 130px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a6fb8;
            color: white;
            border-radius: 50%;
            font-weight: 700;
            text-align: center;
            font-size: 14px;
        }

        .main {
            width: 100%;
            max-width: 900px;
            margin-top: 180px;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 14px 0;
        }

        .model {
            background: var(--accent-blue);
            color: white;
            padding: 12px;
            border-radius: 6px;
            width: 75px;
            font-weight: 700;
        }

        .modelbox {
            width: 80px;
            padding: 23px;
            border: 2px solid #ccc;
            border-radius: 6px;
            text-align: center;
            font-size: 20px;
        }

        .label {
            background: var(--accent-blue);
            color: white;
            padding: 12px;
            border-radius: 6px;
            width: 220px;
            font-weight: 700;
        }

        .small-label {
            background: var(--accent-blue);
            color: white;
            padding: 12px 0;
            border-radius: 6px;
            width: 100px;
            text-align: center;
            font-weight: 700;
        }

        .box {
            width: 150px;
            padding: 12px;
            border: 2px solid #ccc;
            border-radius: 6px;
            text-align: center;
            font-size: 20px;
        }

        .box1 {
            width: 100px;
            padding: 12px;
            border: 2px solid #ccc;
            border-radius: 6px;
            text-align: center;
            font-size: 20px;
        }

        .box2 {
            width: 70px;
            padding: 12px;
            border: 2px solid #ccc;
            border-radius: 6px;
            text-align: center;
            font-size: 20px;
        }

        .actual {
            background: #00d060;
            border-color: #009c40;
            color: white;
        }

        .btn {
            appearance: none;
            border: 4px solid var(--btn-border);
            border-radius: 14px;
            font-weight: 900;
            font-size: 22px;
            min-width: 200px;
            padding: 14px 36px;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: transform .12s ease, box-shadow .12s ease;
        }

        .btn2 {
            appearance: none;
            border: 4px solid var(--btn-border);
            border-radius: 14px;
            font-weight: 600;
            font-size: 20px;
            min-width: 100px;
            padding: 12px 20px;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: transform .12s ease, box-shadow .12s ease;
        }

        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.18);
        }

        .btn2:active {
            transform: translateY(3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.18);
        }

        .green-btn {
            background: linear-gradient(var(--green-top), var(--green-bottom));
            color: #003300;
        }

        .red-btn {
            background: linear-gradient(var(--red-top), var(--red-bottom));
            color: white;
        }

        .yellow-btn {
            background: linear-gradient(var(--yellow-top), var(--yellow-bottom));
            color: #000;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            70% {
                transform: scale(1.02);
            }

            100% {
                transform: scale(1);
            }
        }

        #pauseBtn.pulse {
            animation: pulse 1.8s infinite ease-out;
        }

        #pauseBtn.paused {
            animation: none !important;
            background: linear-gradient(#f6e27a, #d9a700);
            color: #111;
            box-shadow: inset 0 3px 6px rgba(255, 255, 255, 0.45), 0 6px 18px rgba(0, 0, 0, 0.18);
            transform: none;
        }

        .grey-btn {
            background: linear-gradient(var(--grey-top), var(--grey-bottom));
            color: #222;
        }

        .ready {
            margin: 20px auto;
            padding: 18px;
            width: 450px;
            background: #a6ff9e;
            border-radius: 12px;
            text-align: center;
            font-weight: 800;
            font-size: 24px;
        }
    </style>

    <style>
      
    .t2 {
      position: fixed;
      bottom: 40px;
      left: 20px;
      z-index: 9999;
    }

    .t1 {
      position: fixed;
      bottom: 20px;
      left: 30px;
      z-index: 9999;
    }

    .indicator {
      width: 31px;
      height: 31px;
      border-radius: 50%;
      border: 3px solid #222;
      background-color: #ff0000;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
    }

    .indicator.on {
      background-color: #00ff00;
      box-shadow: 0 0 12px #33ff33;
    }

    </style>
    <script src="/static/js/chart.umd.min.js"></script>
</head>

<body>

    <div class="t2">
        <h4>PLC Com.</h4>
    </div>
    <div class="t1">
        <div class="indicator" id="indicator3071"></div>
    </div>

    <div class="topbar">
        <button class="back-btn" onclick="goBack()">BACK</button>
        <div class="title">PRESSURE TESTING SYSTEM GRAPH</div>
        <div class="clock" id="clock"></div>
    </div>

    <div class="topbar2">

        <!-- CSV selector row -->
        <div class="csv-controls">
            <select id="csvSelect"></select>
            <button onclick="loadCSV()" class="btn2 grey-btn">LOAD</button>
        </div>

        <!-- Graph -->
        <div style="width:100%;">
            <h3>Pressure vs Time</h3>
            <canvas id="graphT" style="width:100%; height:320px;"></canvas>
            <input type="range" id="scrollBar" min="0" max="0" value="0" style="width:100%; margin-top:10px;"
                oninput="scrollChart()">
        </div>

    </div>
<script>
  function updateIndicator() {
    fetch("/indicator_plc")
      .then(r => r.json())
      .then(data => {
        const el = document.getElementById("indicator3071");
        if (!el || !data.ok) return;

        if (data.value === 1) {
          el.classList.add("on");   // green
        } else {
          el.classList.remove("on"); // red
        }
      })
      .catch(() => {});
  }

  setInterval(updateIndicator, 300);
  updateIndicator();
</script>

    <script>

        function updateClock() {
            const m = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const d = new Date();
            document.getElementById("clock").innerHTML =
                `${String(d.getDate()).padStart(2, '0')}/${m[d.getMonth()]}/${d.getFullYear()}<br>` +
                `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}:${String(d.getSeconds()).padStart(2, '0')}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function goBack() {
            window.location.href = "/auto";
        }
    </script>

    <script>


        const Y_MARGIN = 1.5; // mm above peak

        function updateYAxisScale() {
            const data = chartTime.data.datasets[0].data;
            if (!data || data.length === 0) return;

            const maxVal = Math.max(...data);
            const newMax = Math.ceil(maxVal * Y_MARGIN);

            const yScale = chartTime.options.scales.y;

            if (!yScale.max || newMax > yScale.max) {
                yScale.max = newMax;
            }
        }
        const ctx1 = document.getElementById("graphT").getContext("2d");

        const WINDOW_SIZE = 100;
        let autoScroll = true;
        let allLabels = [];
        let allValues = [];

        let chartTime = new Chart(ctx1, {
            type: "line",
            data: {
                labels: [],
                datasets: [{
                    label: "Pressure",
                    data: [],
                    borderColor: "red",
                    borderWidth: 2,
                    pointRadius: 0,
                    tension: 0.25
                }]
            },
            options: {
                animation: false,
                scales: {
                    x: {
                        min: 0,
                        max: WINDOW_SIZE,
                        title: { display: true, text: "Time" }
                    },
                    y: {
                        title: { display: true, text: "Pressure (bar)" }
                    }
                }
            }
        });

        /* Load CSV list */
        fetch("/csv_list")
            .then(r => r.json())
            .then(data => {
                const sel = document.getElementById("csvSelect");
                sel.innerHTML = "";
                data.files.forEach(f => {
                    const opt = document.createElement("option");
                    opt.value = f;
                    opt.textContent = f;
                    sel.appendChild(opt);
                });
            });

        /* Load selected CSV */
        function loadCSV() {
            const file = document.getElementById("csvSelect").value;
            if (!file) return;

            autoScroll = true;

            fetch(`/csv_data/${file}`)
                .then(r => r.json())
                .then(data => {

                    allLabels = data.labels.map(ts => ts.substring(11, 19));
                    allValues = data.values;

                    const total = allLabels.length;
                    const slider = document.getElementById("scrollBar");

                    slider.max = Math.max(0, total - WINDOW_SIZE);
                    slider.value = slider.max;

                    updateWindow(slider.value);
                });
        }

        /* Update visible 100-point window */
        function updateWindow(startIndex) {
            const start = parseInt(startIndex);
            const end = start + WINDOW_SIZE;

            chartTime.data.labels = allLabels.slice(start, end);
            chartTime.data.datasets[0].data = allValues.slice(start, end);

            updateYAxisScale()

            chartTime.update("none");
        }

        /* Scrollbar control */
        function scrollChart() {
            autoScroll = false;
            const pos = document.getElementById("scrollBar").value;
            updateWindow(pos);
        }
    </script>

</body>

</html>
