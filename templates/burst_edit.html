<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Burst Pressure</title>

  <style>
    :root {
      --brand: #003f57;
      --accent-blue: #0a6fb8;
      --btn-yellow-top: #fff36b;
      --btn-yellow-bottom: #e6b800;
      --bg: #ffffff;
      --btn-border: rgba(0, 0, 0, 0.6);
      --shadow: 0 8px 20px rgba(0, 0, 0, 0.28);
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: white;
      color: var(--brand);
    }

    .topbar {
      position: absolute;
      left: 18px;
      right: 18px;
      top: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 9999;
    }

    .back-btn {
      pointer-events: auto;
      background: linear-gradient(#f2f2f2, #cfcfcf);
      padding: 10px 18px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: inset 0 4px 8px rgba(255, 255, 255, 0.6), 0 6px 12px rgba(0, 0, 0, 0.18);
    }

    .back-btn:active {
      transform: translateY(3px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.18);
    }

    .title {
      font-size: 44px;
      font-weight: 800;
      padding: 6px 24px;
      border: 5px solid #ff8c00;
      border-radius: 8px;
    }

    .clock {
      width: 130px;
      height: 130px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a6fb8;
      color: white;
      border-radius: 50%;
      font-weight: 700;
      text-align: center;
      font-size: 14px;
    }

    .main-box {
      width: 800px;
      margin: 40px auto;
      padding: 30px 40px;
      background: #f2eff9;
      border-radius: 10px;
      border: 1px solid #999;
      margin-top: 230px;
    }

    .label {
      background: #0a6fb8;
      color: white;
      padding: 12px;
      font-size: 20px;
      font-weight: 700;
      width: 280px;
      text-align: center;
      border-radius: 6px;
    }

    .label.orange {
      background: #ffcc88;
      color: black;
    }

    .row {
      display: flex;
      justify-content: space-between;
      padding: 10px 120px;
      align-items: center;
    }

    .value-box {
      background: linear-gradient(#ffffff, #e3e3e3);
      width: 150px;
      padding: 10px 0;
      text-align: center;
      border-radius: 6px;
      border: 2px solid #777;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    .bottom-row {
      width: 600px;
      margin: 40px auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Min/Max floating box like your screenshot */
    .minmax-box {
      position: absolute;
      background: white;
      border: 3px solid #0a6fb8;
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 18px;
      font-weight: 700;
      color: #003f57;
      display: none;
      z-index: 2000;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
    }
  </style>

  <style>
  
    .t2 {
      position: fixed;
      bottom: 40px;
      left: 20px;
      z-index: 9999;
    }

    .t1 {
      position: fixed;
      bottom: 20px;
      left: 30px;
      z-index: 9999;
    }

    .indicator {
      width: 31px;
      height: 31px;
      border-radius: 50%;
      border: 3px solid #222;
      background-color: #ff0000;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
    }

    .indicator.on {
      background-color: #00ff00;
      box-shadow: 0 0 12px #33ff33;
    }

  </style>

</head>

<body>

  <div class="t2">
    <h4>PLC Com.</h4>
  </div>

  <div class="t1">
    <div class="indicator" id="indicator3071"></div>
  </div>

  <div class="topbar">
    <button class="back-btn" id="backBtn">BACK</button>
    <div class="title">Burst Pressure</div>
    <div class="clock" id="clock"></div>
  </div>

  <div class="main-box">

    <div class="row">
      <div class="label">Pressure (bar)</div>

      <div style="position:relative;">
        <input class="value-box" id="pressure_set_e" onclick="openEdit('pressure_set_e', 0, 10)"
          onkeydown="checkEnter(event, 'pressure_set_e')">

        <div class="minmax-box" id="minmax_pressure_set_e"></div>
      </div>
    </div>

    <div class="row">
      <div class="label">Rate of Rise (bar/min)</div>

      <div style="position:relative;">
        <input class="value-box" id="rate_set_e" onclick="openEdit('rate_set_e', 0, 3000)"
          onkeydown="checkEnter(event, 'rate_set_e')">

        <div class="minmax-box" id="minmax_rate_set_e"></div>
      </div>
    </div>

    <!-- <div class="row">
      <div class="label orange">Leak Detected to Stop (bar)</div>

      <div style="position:relative;">
        <input class="value-box" id="leak_set_e" onclick="openEdit('leak_set_e', 0, 3000)"
          onkeydown="checkEnter(event, 'leak_set_e')">

        <div class="minmax-box" id="minmax_leak_set_e"></div>
      </div>
    </div> -->

  </div>

  <div class="bottom-row">
    <div class="label" style="margin:0; width:260px;">Test Duration (min)</div>
    <div class="value-box" id="duration_set_e">0.00</div>
  </div>

  <script>

    /* CLOCK */
    function updateClock() {
      const m = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      const d = new Date();
      document.getElementById("clock").innerHTML =
        `${String(d.getDate()).padStart(2, '0')}/${m[d.getMonth()]}/${d.getFullYear()}<br>` +
        `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}:${String(d.getSeconds()).padStart(2, '0')}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    function hidePopup() {
      document.querySelectorAll(".minmax-box").forEach(box => {
        box.style.display = "none";
      });

      allowRead = true;
    }

    const SCALE = {
      pressure_set_e: 1,
      rate_set_e: 1,
      duration_set_e: 1
    };

    let allowRead = true;

    function openEdit(id, min, max) {
      allowRead = false;  

      let input = document.getElementById(id);
      let box = document.getElementById("minmax_" + id);

      box.innerHTML = `Min: ${min}<br>Max: ${max}`;
      box.style.display = "block";

      box.style.left = input.offsetLeft + "px";
      box.style.top = (input.offsetTop - 75) + "px";
    }
      
    function readPLC() {
      fetch("/set_page/burst_edit")
      if (!allowRead) return;
      fetch("/plc_value")
        .then(r => r.json())
        .then(d => {
          if (!allowRead) return;

          document.getElementById("pressure_set_e").value =
            d.pressure_set_e != null ? (d.pressure_set_e / SCALE.pressure_set_e).toFixed(2) : "0.0";

          document.getElementById("rate_set_e").value =
            d.rate_set_e != null ? (d.rate_set_e / SCALE.rate_set_e).toFixed(2) : "0.0";

          document.getElementById("duration_set_e").innerText =
            d.duration_set_e != null ? (d.duration_set_e / SCALE.duration_set_e).toFixed(2) : "0.0";
        });
    }

    const LIMITS = {
      pressure_set_e: { min: 0.00, max: 9999.00 },
      rate_set_e: { min: 0.00, max: 9999.00 },
    };

    function checkEnter(event, key) {
      if (event.key !== "Enter") return;

      let val = parseFloat(event.target.value);
      if (isNaN(val)) {
        alert("Invalid number");
        return;
      }

      const lim = LIMITS[key];
      if (lim && (val < lim.min || val > lim.max)) {
        alert(`Value must be between ${lim.min} and ${lim.max}`);
        return;
      }

      let scaledValue = val * SCALE[key];

      fetch("/write_burst_value", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ key, value: scaledValue })
      }).then(() => {
        allowRead = true;
        hidePopup();
      });

      event.target.blur();
    }

    setInterval(readPLC, 200);
    readPLC();

    document.addEventListener("mousedown", function (e) {

      hidePopup();
      if (e.target.classList.contains("value-box")) return;
      if (e.target.classList.contains("minmax-box")) return;
      document.querySelectorAll(".minmax-box").forEach(b => b.style.display = "none");
      allowRead = true;
    });

    document.getElementById("backBtn").onclick =
      () => window.location.href = "/edit_program";

  </script>

  <script>
    fetch("/page_change", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ page: 5 })
    });
  </script>
<script>
  function updateIndicator() {
    fetch("/indicator_plc")
      .then(r => r.json())
      .then(data => {
        const el = document.getElementById("indicator3071");
        if (!el || !data.ok) return;

        if (data.value === 1) {
          el.classList.add("on");   // green
        } else {
          el.classList.remove("on"); // red
        }
      })
      .catch(() => {});
  }

  setInterval(updateIndicator, 300);
  updateIndicator();
</script>


</body>

</html>
