<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Stage Pressure Edit</title>

    <style>
        :root {
            --blue: #0a6fb8;
            --grey1: #ffffff;
            --grey2: #dedede;
            --orange: #ffb347;
            --accent-blue: #0a6fb8;
            --brand: #003f57;
        }

        body {
            margin: 0;
            background: var(--bg);
            font-family: "Segoe UI", Roboto, Arial, Helvetica, sans-serif;
            color: var(--brand);
        }

        .topbar {
            position: absolute;
            left: 18px;
            right: 18px;
            top: 5px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 9999;
        }

        .back-btn {
            pointer-events: auto;
            background: linear-gradient(#f2f2f2, #cfcfcf);
            padding: 10px 18px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: inset 0 4px 8px rgba(255, 255, 255, 0.6), 0 6px 12px rgba(0, 0, 0, 0.18);
        }

        .back-btn:active {
            transform: translateY(3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.18);
        }

        .title {
            font-size: 44px;
            font-weight: 800;
            padding: 6px 22px;
            border: 5px solid #ff8c00;
            border-radius: 5px;
        }

        .clock {
            width: 130px;
            height: 130px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a6fb8;
            color: white;
            border-radius: 50%;
            font-weight: 700;
            text-align: center;
            font-size: 14px;
        }

        .top-row {
            margin: 10px auto;
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 130px;
        }

        .top-label {
            background: var(--blue);
            color: white;
            padding: 6px 19px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 800;
        }

        .top-box {
            width: 90px;
            text-align: center;
            background: linear-gradient(var(--grey1), var(--grey2));
            border: 2px solid #555;
            padding: 6px 15px;
            border-radius: 6px;
            font-weight: 700;
        }

        input {
            outline: none;
        }

        .big-box {
            width: 700px;
            margin: 12px auto;
            border: 2px solid #444;
            border-radius: 8px;
            padding: 14px 18px;
        }

        .header-row,
        .body-grid {
            display: grid;
            grid-template-columns: 100px 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .header-cell {
            background: var(--blue);
            color: white;
            padding: 6px 0;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 800;
            text-align: center;
        }

        .stage-label {
            background: var(--blue);
            color: white;
            padding: 6px 0;
            border-radius: 6px;
            border: 2px solid #555;
            font-size: 14px;
            text-align: center;
            font-weight: 700;
        }

        .value-box {
            background: linear-gradient(var(--grey1), var(--grey2));
            border: 2px solid #666;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
            padding: 6px 0;
            font-weight: 700;
            cursor: pointer;
        }

        .minmax-box {
            position: absolute;
            display: none;
            background: white;
            padding: 6px 10px;
            border-radius: 8px;
            border: 2px solid #0a6fb8;
            font-size: 13px;
            font-weight: 700;
            z-index: 500;
        }

        .bottom-row {
            margin-top: 2px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .bottom-label {
            background: var(--blue);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            width: 150px;
            text-align: center;
            font-size: 14px;
            font-weight: 800;
        }

        .orange {
            background: var(--orange);
            color: black;
        }

        .bottom-box {
            width: 110px;
            padding: 8px 0;
            background: linear-gradient(var(--grey1), var(--grey2));
            border-radius: 6px;
            border: 2px solid #666;
            text-align: center;
            font-weight: 800;
            cursor: pointer;
        }
    </style>

    <style>
  
    .t2 {
      position: fixed;
      bottom: 40px;
      left: 20px;
      z-index: 9999;
    }

    .t1 {
      position: fixed;
      bottom: 20px;
      left: 30px;
      z-index: 9999;
    }

    .indicator {
      width: 31px;
      height: 31px;
      border-radius: 50%;
      border: 3px solid #222;
      background-color: #ff0000;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
    }

    .indicator.on {
      background-color: #00ff00;
      box-shadow: 0 0 12px #33ff33;
    }

  </style>

</head>

<body>

    <div class="t2">
        <h4>PLC Com.</h4>
    </div>

    <div class="t1">
        <div class="indicator" id="indicator3071"></div>
    </div>

    <div class="topbar">
        <button class="back-btn" id="backBtn">BACK</button>
        <div class="title">Stage Pressure</div>
        <div class="clock" id="clock"></div>
    </div>

    <div class="top-row">
        <div class="top-label">Number of Stages</div>
        <input id="s_count" class="top-box" onfocus="stopReading()" onkeydown="save(event,'stage_count_set_a')"
            onclick="showMM('s_count',0,8)">
        <div class="top-label">Starting Pressure (bar)</div>
        <input id="s_start" class="top-box" onfocus="stopReading()" onkeydown="save(event,'press_set_a')"
            onclick="showMM('s_start',0.1,10)">

    </div>

    <div class="big-box">
        <div class="header-row">
            <div></div>
            <div class="header-cell">Pressure (bar)</div>
            <div class="header-cell">Rate of Rise(s)</div>
            <div class="header-cell">Dwell Time</div>
        </div>
<div class="body-grid" id="stageGrid"></div>

<script>
  const grid = document.getElementById("stageGrid");

  for (let i = 1; i <= 8; i++) {
    grid.insertAdjacentHTML("beforeend", `
      <div class="stage-label">Stage-${i}</div>

      <input class="value-box" id="p${i}"
             onclick="showMM('p${i}',0,10)"
             onfocus="stopReading()"
             onkeydown="save(event,'p${i}')">

      <input class="value-box" id="r${i}"
             onclick="showMM('r${i}',0,9999.0)"
             onfocus="stopReading()"
             onkeydown="save(event,'r${i}')">

      <input class="value-box" id="d${i}"
             onclick="showMM('d${i}',0,9999.0)"
             onfocus="stopReading()"
             onkeydown="save(event,'d${i}')">
    `);
  }
</script>

        </div>
    </div>

    <div class="bottom-row">
        <div class="bottom-label">Number of Cycles</div>
        <input class="bottom-box" id="stage_cycles" onfocus="stopReading()" onclick="showMM('stage_cycles',0,1000000)"
            onkeydown="save(event,'stage_cycles')">

        <div class="bottom-label">Test Duration</div>
        <div class="bottom-box" id="stage_duration">0.00</div>

        <!-- <div class="bottom-label orange">Leak Value</div>
        <input class="bottom-box" id="stage_leak" onfocus="stopReading()" onclick="showMM('stage_leak',0,3000)"
            onkeydown="save(event,'stage_leak')">
    </div> -->

    <div id="popup" class="minmax-box"></div>

    <script>
        function updateClock() {
            const M = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const d = new Date();
            document.getElementById("clock").innerHTML =
                `${String(d.getDate()).padStart(2, '0')}/${M[d.getMonth()]}/${d.getFullYear()}<br>` +
                `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}:${String(d.getSeconds()).padStart(2, '0')}`;
        }
        updateClock();
        setInterval(updateClock, 1000);

        document.getElementById("backBtn").onclick = () => {
            location.href = "/edit_program";
        };

        const SCALE = {
            stage_count_set_a: 1,
            press_set_a: 1,

            stage_p: 1,   
            stage_r: 10,    
            stage_d: 10,    

            stage_cycles: 1,
            // stage_leak: 26.66,
            stage_duration: 10
        };

        let allow = true;
        function stopReading() { allow = false; }
        function resumeReading() { allow = true; }

        setInterval(() => { if (allow) readPLC(); }, 200);
// window.addEventListener("load", () => {
//     fetch("/set_page/stage_edit");
// });

        function readPLC() {
            fetch("/set_page/stage_edit")
            fetch("/plc_value")
                .then(r => r.json())
                .then(d => {

                    if (!allow) return;

                    document.getElementById("s_count").value =
                        d.stage_count_set_a != null
                            ? (d.stage_count_set_a / SCALE.stage_count_set_a).toFixed(0)
                            : "0.0";

                    document.getElementById("s_start").value =
                        d.press_set_a != null
                            ? (d.press_set_a / SCALE.press_set_a).toFixed(1)
                            : "0.0";

                    for (let i = 1; i <= 8; i++) {
                        document.getElementById("p" + i).value =
                            d["stage_p" + i] != null
                                ? (d["stage_p" + i] / SCALE.stage_p).toFixed(1)
                                : "0.0";

                        document.getElementById("r" + i).value =
                            d["stage_r" + i] != null
                                ? (d["stage_r" + i] / SCALE.stage_r).toFixed(1)
                                : "0.0";

                        document.getElementById("d" + i).value =
                            d["stage_d" + i] != null
                                ? (d["stage_d" + i] / SCALE.stage_d).toFixed(1)
                                : "0.0";
                    }

                    document.getElementById("stage_cycles").value =
                        d.stage_cycles != null
                            ? (d.stage_cycles / SCALE.stage_cycles).toFixed(0)
                            : "0.0";

                    // document.getElementById("stage_leak").value =
                    //     d.stage_leak != null
                    //         ? (d.stage_leak / SCALE.stage_leak).toFixed(1)
                    //         : "0.0";

                    document.getElementById("stage_duration").innerText =
                        d.stage_duration != null
                            ? (d.stage_duration / SCALE.stage_duration).toFixed(1)
                            : "0.0";
                });
        }
        function hidePopup() {
            document.getElementById("popup").style.display = "none";
            activeInput = null;
            resumeReading();
        }

        function showMM(id, min, max) {

            stopReading();

            let box = document.getElementById(id);
            let pop = document.getElementById("popup");

            pop.innerHTML = `Min: ${min}<br>Max: ${max}`;
            pop.style.display = "block";

            const rect = box.getBoundingClientRect();
            pop.style.left = rect.left + "px";
            pop.style.top = (rect.top - 40 + window.scrollY) + "px";
        }

        document.addEventListener("mousedown", e => {
            if (!e.target.classList.contains("value-box") &&
                !e.target.classList.contains("top-box") &&
                !e.target.classList.contains("bottom-box")) {

                document.getElementById("popup").style.display = "none";

                resumeReading();
                hidePopup();
            }
        });

const LIMITS = {
  stage_count_set_a: { min: 0, max: 9999 },
  press_set_a:       { min: 0.0, max: 9999.0 },

  p: { min: 0.0, max: 9999.0 },     // stage pressure (bar)
  r: { min: 0.0,   max: 9999.0 },     // rate
  d: { min: 0.0,   max: 9999.0 },     // dwell

  stage_cycles: { min: 0, max: 999999999 }
};

function save(e, key) {
  if (e.key !== "Enter") return;

  let val = parseFloat(e.target.value);
  if (isNaN(val)) {
    alert("Invalid number");
    return;
  }

  let min, max, scale = 1;

  // -------- determine limits & scale --------
  if (key === "stage_count_set_a") {
    ({ min, max } = LIMITS.stage_count_set_a);
    scale = SCALE.stage_count_set_a;

  } else if (key === "press_set_a") {
    ({ min, max } = LIMITS.press_set_a);
    scale = SCALE.press_set_a;

  } else if (key === "stage_cycles") {
    ({ min, max } = LIMITS.stage_cycles);
    scale = SCALE.stage_cycles;

  } else if (key.startsWith("p")) {
    ({ min, max } = LIMITS.p);
    scale = SCALE.stage_p;

  } else if (key.startsWith("r")) {
    ({ min, max } = LIMITS.r);
    scale = SCALE.stage_r;
    val = Math.round(val);   // UINT16 safety

  } else if (key.startsWith("d")) {
    ({ min, max } = LIMITS.d);
    scale = SCALE.stage_d;
    val = Math.round(val);   // UINT16 safety

  } else {
    alert("Unknown parameter");
    return;
  }

  // -------- min / max check --------
  if (val < min || val > max) {
    alert(`Value must be between ${min} and ${max}`);
    return;
  }

  // -------- scale for PLC --------
  const scaled = val * scale;

  stopReading();

  fetch("/write_stage_value", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ key, value: scaled })
  })
  .then(r => r.json())
  .then(res => {
    if (!res.success) {
      alert("PLC write failed");
    }
  })
  .finally(() => {
    resumeReading();
    hidePopup();
    e.target.blur();
  });
}

    </script>

    <script>
        fetch("/page_change", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ page: 7 })
        });
    </script>
<script>
  function updateIndicator() {
    fetch("/indicator_plc")
      .then(r => r.json())
      .then(data => {
        const el = document.getElementById("indicator3071");
        if (!el || !data.ok) return;

        if (data.value === 1) {
          el.classList.add("on");   // green
        } else {
          el.classList.remove("on"); // red
        }
      })
      .catch(() => {});
  }

  setInterval(updateIndicator, 300);
  updateIndicator();
</script>


</body>

</html>
