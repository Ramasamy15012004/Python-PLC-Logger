<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Impulse Pressure-1</title>

    <style>
        :root {
            --blue: #0a6fb8;
            --purple: #efe9fb;
            --grey1: #ffffff;
            --grey2: #dcdcdc;
            --orange: #ffb347;
            --dark: #003f57;
        }

        body {
            margin: 0;
            background: white;
            font-family: "Segoe UI", Arial;
        }

        .topbar {
            position: absolute;
            left: 18px;
            right: 18px;
            top: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 9999;
            /* FIX */
        }

        .back-btn {
            pointer-events: auto;
            background: linear-gradient(#f2f2f2, #cfcfcf);
            padding: 10px 18px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: inset 0 4px 8px rgba(255, 255, 255, 0.6), 0 6px 12px rgba(0, 0, 0, 0.18);
        }

        .back-btn:active {
            transform: translateY(3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.18);
        }

        .title {
            font-size: 44px;
            font-weight: 800;
            padding: 6px 24px;
            border-radius: 5px;
            border: 5px solid #ff8c00;
        }

        .clock {
            width: 130px;
            height: 130px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a6fb8;
            color: white;
            border-radius: 50%;
            font-weight: 700;
            text-align: center;
            font-size: 14px;
        }

        .big-box {
            width: 820px;
            margin: 20px auto;
            background: var(--purple);
            padding: 25px;
            border-radius: 10px;
            border: 2px solid #666;
            margin-top: 190px;
        }

        .header-row {
            display: grid;
            grid-template-columns: 180px 1fr 1fr 1fr;
            gap: 18px;
            margin-bottom: 15px;
        }

        .header-cell {
            background: var(--blue);
            color: white;
            padding: 10px 0;
            border-radius: 6px;
            text-align: center;
            font-size: 18px;
            font-weight: 800;
        }

        .body-grid {
            display: grid;
            grid-template-columns: 180px 1fr 1fr 1fr;
            gap: 18px;
        }

        .label-col {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .left-label {
            background: var(--blue);
            color: white;
            padding: 10px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 800;
            text-align: center;
        }

        .param-col {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .value-box {
            background: linear-gradient(var(--grey1), var(--grey2));
            border-radius: 6px;
            padding: 10px 0;
            border: 2px solid #666;
            font-size: 18px;
            text-align: center;
            font-weight: 800;
            cursor: pointer;
        }

        .value-box {
            width: 188px;
        }

        .lower-section {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }

        .lower-row {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .lower-label {
            background: var(--blue);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 800;
            width: 220px;
            text-align: center;
        }

        .lower-orange {
            background: var(--orange);
            color: black;
        }

        .lower-box {
            width: 150px;
            background: linear-gradient(var(--grey1), var(--grey2));
            padding: 10px 0;
            border: 2px solid #666;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 800;
            text-align: center;
            cursor: pointer;
        }

        .minmax-box {
            position: absolute;
            background: white;
            border: 2px solid #0a6fb8;
            border-radius: 10px;
            padding: 8px 10px;
            font-size: 14px;
            font-weight: 700;
            display: none;
            z-index: 2000;
        }
    </style>

    <style>
        
    .t2 {
      position: fixed;
      bottom: 40px;
      left: 20px;
      z-index: 9999;
    }

    .t1 {
      position: fixed;
      bottom: 20px;
      left: 30px;
      z-index: 9999;
    }

    .indicator {
      width: 31px;
      height: 31px;
      border-radius: 50%;
      border: 3px solid #222;
      background-color: #ff0000;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
    }

    .indicator.on {
      background-color: #00ff00;
      box-shadow: 0 0 12px #33ff33;
    }

    </style>

</head>

<body>

    <div class="t2">
        <h4>PLC Com.</h4>
    </div>

    <div class="t1">
        <div class="indicator" id="indicator3071"></div>
    </div>

    <div class="topbar">
        <button class="back-btn" id="backBtn">BACK</button>
        <div class="title">Impulse Pressure</div>
        <div class="clock" id="clock"></div>
    </div>

    <div class="big-box">

        <div class="header-row">
            <div></div>
            <div class="header-cell">Pressure (bar)</div>
            <div class="header-cell">Rate of Rise (S)</div>
            <div class="header-cell">Dwell Time (S)</div>
        </div>

        <div class="body-grid">

            <div class="label-col">
                <div class="left-label">Maximum</div>
                <div class="left-label">Minimum</div>
            </div>

            <div class="param-col">
                <input class="value-box" id="imp1_max_press" onclick="showMinMax('imp1_max_press',0.0,9999.0)"
                    onfocus="stopReading()" onkeydown="saveOnEnter(event,'imp1_max_press')">
                <input class="value-box" id="imp1_min_press" onclick="showMinMax('imp1_min_press',0.0,9999.0)"
                    onfocus="stopReading()" onkeydown="saveOnEnter(event,'imp1_min_press')">

                <div class="minmax-box" id="minmax_imp1_max_press"></div>
                <div class="minmax-box" id="minmax_imp1_min_press"></div>
            </div>

            <div class="param-col">
                <input class="value-box" id="imp1_max_rate" onclick="showMinMax('imp1_max_rate',0.0,9999.0)"
                    onfocus="stopReading()" onkeydown="saveOnEnter(event,'imp1_max_rate')">
                <input class="value-box" id="imp1_min_rate" onclick="showMinMax('imp1_min_rate',0.0,9999.0)"
                    onfocus="stopReading()" onkeydown="saveOnEnter(event,'imp1_min_rate')">

                <div class="minmax-box" id="minmax_imp1_max_rate"></div>
                <div class="minmax-box" id="minmax_imp1_min_rate"></div>
            </div>

            <div class="param-col">
                <input class="value-box" id="imp1_max_dwell" onclick="showMinMax('imp1_max_dwell',0.0,65535.0)"
                    onfocus="stopReading()" onkeydown="saveOnEnter(event,'imp1_max_dwell')">
                <input class="value-box" id="imp1_min_dwell" onclick="showMinMax('imp1_min_dwell',0.0,65535.0)"
                    onfocus="stopReading()" onkeydown="saveOnEnter(event,'imp1_min_dwell')">

                <div class="minmax-box" id="minmax_imp1_max_dwell"></div>
                <div class="minmax-box" id="minmax_imp1_min_dwell"></div>
            </div>

        </div>
    </div>

    <div class="lower-section">

        <div class="lower-row">
            <div class="lower-label">No of cycles</div>
            <input class="lower-box" id="imp1_cycles" onclick="showMinMax('imp1_cycles',0,4294967295)"
                onfocus="stopReading()" onkeydown="saveOnEnter(event,'imp1_cycles')">
            <div class="minmax-box" id="minmax_imp1_cycles"></div>
        </div>

        <div class="lower-row">
            <div class="lower-label">Test Duration (min)</div>
            <div class="lower-box" id="imp1_duration">0.0</div>
        </div>

        <!-- <div class="lower-row">
            <div class="lower-label lower-orange">Leak Detected to Stop (bar)</div>
            <input class="lower-box" id="imp1_leak" onclick="showMinMax('imp1_leak',0,3000)" onfocus="stopReading()"
                onkeydown="saveOnEnter(event,'imp1_leak')">
            <div class="minmax-box" id="minmax_imp1_leak"></div>
        </div> -->

    </div>


    <script>

        function updateClock() {
            const m = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const d = new Date();
            document.getElementById("clock").innerHTML =
                `${String(d.getDate()).padStart(2, '0')}/${m[d.getMonth()]}/${d.getFullYear()}<br>` +
                `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}:${String(d.getSeconds()).padStart(2, '0')}`;
        }
        setInterval(updateClock, 1000);
        updateClock();


        const SCALE = {
            imp1_max_press: 1,
            imp1_max_rate: 10,
            imp1_max_dwell: 10,

            imp1_min_press: 1,
            imp1_min_rate: 10,
            imp1_min_dwell: 10,

            imp1_cycles: 1,
            imp1_duration: 10,
            // imp1_leak: 26.66
        };

        let allowRead = true;
        function stopReading() { allowRead = false; }
        function resumeReading() { allowRead = true; }

        function hidePopup() {
            document.querySelectorAll(".minmax-box").forEach(box => {
                box.style.display = "none";
            });
            allowRead = true;
        }

        function showMinMax(id, min, max) {

            stopReading();

            let box = document.getElementById("minmax_" + id);
            let input = document.getElementById(id);

            box.innerHTML = `Min: ${min}<br>Max: ${max}`;
            box.style.display = "block";

            box.style.left = input.offsetLeft + "px";
            box.style.top = (input.offsetTop - 70) + "px";
        }

        setInterval(readPLC, 200);

        
        function readPLC() {
            fetch("/set_page/impluse_1_edit")
            if (!allowRead) return;
            fetch("/plc_value")
                .then(r => r.json())
                .then(d => {

                    if (!allowRead) return;

                    document.getElementById("imp1_max_press").value =
                        d.imp1_max_press != null ? (d.imp1_max_press / SCALE.imp1_max_press).toFixed(1) : "0.0";

                    document.getElementById("imp1_max_rate").value =
                        d.imp1_max_rate != null ? (d.imp1_max_rate / SCALE.imp1_max_rate).toFixed(1) : "0.0";

                    document.getElementById("imp1_max_dwell").value =
                        d.imp1_max_dwell != null ? (d.imp1_max_dwell / SCALE.imp1_max_dwell).toFixed(1) : "0.0";

                    document.getElementById("imp1_min_press").value =
                        d.imp1_min_press != null ? (d.imp1_min_press / SCALE.imp1_min_press).toFixed(1) : "0.0";

                    document.getElementById("imp1_min_rate").value =
                        d.imp1_min_rate != null ? (d.imp1_min_rate / SCALE.imp1_min_rate).toFixed(1) : "0.0";

                    document.getElementById("imp1_min_dwell").value =
                        d.imp1_min_dwell != null ? (d.imp1_min_dwell / SCALE.imp1_min_dwell).toFixed(1) : "0.0";

                    document.getElementById("imp1_cycles").value =
                        d.imp1_cycles != null ? (d.imp1_cycles / SCALE.imp1_cycles).toFixed(0) : "0.0";

                    document.getElementById("imp1_duration").innerText =
                        d.imp1_duration != null ? (d.imp1_duration / SCALE.imp1_duration).toFixed(1) : "0.0";

                    document.getElementById("imp1_leak").value =
                        d.imp1_leak != null ? (d.imp1_leak / SCALE.imp1_leak).toFixed(1) : "0.0";
                });
        }

            function saveOnEnter(event, key) {
                if (event.key !== "Enter") return;

                let val = parseFloat(event.target.value);
                if (isNaN(val)) {
                    alert("Invalid number");
                    return;
                }

                let scaled = val * SCALE[key];

                fetch("/write_impulse1_value", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        key: key,
                        value: scaled
                    })
                }).then(() => {
                    resumeReading();
                    hidePopup();
                });

                event.target.blur();
            }


        document.addEventListener("mousedown", e => {

            hidePopup();
            if (e.target.classList.contains("value-box")) return;
            if (e.target.classList.contains("minmax-box")) return;

            document.querySelectorAll(".minmax-box")
                .forEach(b => b.style.display = "none");
            resumeReading();
        });


        document.getElementById("backBtn").onclick =
            () => window.location.href = "/edit_program";

    </script>

    <script>
        fetch("/page_change", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ page: 6 })
        });
    </script>
<script>
  function updateIndicator() {
    fetch("/indicator_plc")
      .then(r => r.json())
      .then(data => {
        const el = document.getElementById("indicator3071");
        if (!el || !data.ok) return;

        if (data.value === 1) {
          el.classList.add("on");   // green
        } else {
          el.classList.remove("on"); // red
        }
      })
      .catch(() => {});
  }

  setInterval(updateIndicator, 300);
  updateIndicator();
</script>


</body>

</html>
